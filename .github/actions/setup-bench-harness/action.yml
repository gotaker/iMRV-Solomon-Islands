name: "Setup bench harness"
description: "Install system deps, bootstrap bench via install.sh, download sample DB, install pytest+playwright"

inputs:
  mariadb-root-password:
    description: "MariaDB root password"
    required: true
  sample-db-url:
    description: "URL to sample DB release asset"
    required: true
  python-version:
    description: "Python version to install"
    default: "3.14"
  node-version:
    description: "Node.js version to install"
    default: "24"
  frappe-branch:
    description: "Frappe branch to check out"
    default: "version-16"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    # Install CLIENT-ONLY apt deps. The workflow's MariaDB/Redis service
    # containers already provide the servers on 127.0.0.1:3306 / :6379 — if
    # install.sh's SKIP_SYSTEM_DEPS=0 path runs, its `apt install mariadb-server`
    # collides with the service container on :3306 and dpkg post-install fails.
    # Matches the package list in ci-frappe-tests.yml.
    - name: Install client-only apt deps
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          mariadb-client \
          build-essential libssl-dev libffi-dev \
          xvfb libfontconfig

    - name: Bootstrap bench (install.sh --dev --no-sample-data, SKIP_SYSTEM_DEPS=1)
      shell: bash
      env:
        MYSQL_ROOT_PASSWORD: ${{ inputs.mariadb-root-password }}
        BENCH_DIR: ${{ github.workspace }}/../frappe-bench
        SITE_NAME: test_mrv.localhost
        FRAPPE_BRANCH: ${{ inputs.frappe-branch }}
        SKIP_SYSTEM_DEPS: '1'
      run: |
        ./install.sh --dev --no-sample-data

    - name: Download sample DB from release asset
      shell: bash
      run: |
        mkdir -p ".Sample DB"
        curl -fsSL "${{ inputs.sample-db-url }}" -o ".Sample DB/ci-sample.sql.gz"

    - name: Install harness Python deps
      shell: bash
      run: |
        pip install pytest pytest-timeout playwright requests httpx
        playwright install --with-deps chromium
