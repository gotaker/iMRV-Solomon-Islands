name: ci-test-harness

on:
  pull_request:
    branches: [Main]
  schedule:
    - cron: "0 3 * * *"  # nightly 03:00 UTC (1h after ci-frappe-tests)

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "24"
  FRAPPE_BRANCH: "version-16"
  TEST_SITE: "test_mrv.localhost"
  TEST_PORT: "8001"
  BENCH_DIR: ${{ github.workspace }}/../frappe-bench
  TEST_SERVER_TIMEOUT: "120"

jobs:
  check-secret:
    runs-on: ubuntu-22.04
    outputs:
      has-secret: ${{ steps.probe.outputs.has-secret }}
    steps:
      - id: probe
        run: |
          if [[ -n "${{ secrets.SAMPLE_DB_URL }}" ]]; then
            echo "has-secret=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::SAMPLE_DB_URL secret not set — harness jobs will skip. Fork PRs with no secret access will land here."
            echo "has-secret=false" >> $GITHUB_OUTPUT
          fi

  harness-data-integration:
    needs: check-secret
    if: needs.check-secret.outputs.has-secret == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    env:
      MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
    services:
      mariadb:
        image: mariadb:12.2.2
        env:
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bench-harness
        with:
          mariadb-root-password: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          sample-db-url: ${{ secrets.SAMPLE_DB_URL }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          frappe-branch: ${{ env.FRAPPE_BRANCH }}
      - name: Run Layers 1 + 2 (data + integration)
        run: ./tests/run.sh --layer data && ./tests/run.sh --layer integration
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: harness-data-integration-logs
          path: |
            ${{ github.workspace }}/../frappe-bench/logs/
          retention-days: 7

  harness-ui:
    needs: check-secret
    if: needs.check-secret.outputs.has-secret == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
    services:
      mariadb:
        image: mariadb:12.2.2
        env:
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bench-harness
        with:
          mariadb-root-password: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          sample-db-url: ${{ secrets.SAMPLE_DB_URL }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          frappe-branch: ${{ env.FRAPPE_BRANCH }}
      - name: Run Layer 3 (ui)
        run: ./tests/run.sh --layer ui
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: harness-ui-artifacts
          path: |
            ${{ github.workspace }}/../frappe-bench/logs/
            tests/.screenshots/
            tests/playwright-traces/
          retention-days: 7

  harness-security:
    needs: check-secret
    if: needs.check-secret.outputs.has-secret == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    env:
      MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
    services:
      mariadb:
        image: mariadb:12.2.2
        env:
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bench-harness
        with:
          mariadb-root-password: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          sample-db-url: ${{ secrets.SAMPLE_DB_URL }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          frappe-branch: ${{ env.FRAPPE_BRANCH }}
      - name: Run Layer 5 (security)
        run: ./tests/run.sh --layer security
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: harness-security-logs
          path: |
            ${{ github.workspace }}/../frappe-bench/logs/
          retention-days: 7

  harness-regression:
    needs: check-secret
    if: needs.check-secret.outputs.has-secret == 'true'
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    continue-on-error: true  # advisory for 2 weeks — flip to false once stable
    env:
      MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
    services:
      mariadb:
        image: mariadb:12.2.2
        env:
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bench-harness
        with:
          mariadb-root-password: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          sample-db-url: ${{ secrets.SAMPLE_DB_URL }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          frappe-branch: ${{ env.FRAPPE_BRANCH }}
      - name: Run Layer 4 (regression)
        run: ./tests/run.sh --layer regression
      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: harness-regression-artifacts
          path: |
            ${{ github.workspace }}/../frappe-bench/logs/
            tests/golden/
          retention-days: 7

  # nightly-issue requires the `ci-harness-failure` label to exist in the repo
  # (Settings → Labels). If missing, the github-script create-issue call returns
  # 422 and the job fails. Create the label manually before the first nightly run.
  nightly-issue:
    if: github.event_name == 'schedule' && failure()
    needs: [harness-data-integration, harness-ui, harness-security]
    runs-on: ubuntu-22.04
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly test harness failed — ${new Date().toISOString().slice(0,10)}`,
              body: `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['ci-harness-failure'],
            });
