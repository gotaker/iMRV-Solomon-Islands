id: security_get_data_strips_sensitive_fields
title: "Authenticated get_data response never carries password / reset_password_key / api_secret"
perspective: { role: Administrator, persona: standard, environment: any }
preconditions: { sample_db: required, session: logged_in_as:Administrator, cache: warm }

# Even when called by an authorised role (Administrator here — the "worst case"
# from the response-shape perspective, since this user has read permission on
# every doctype), the response JSON for `mrvtools.api.get_data` MUST NOT carry
# any of the sensitive field names listed in the `_FORBIDDEN_FIELDS` constant
# in mrvtools/api.py. The per-doctype allowlist already excludes them; this
# scenario is the defense-in-depth assertion that the response-shape filter
# can't be regressed.
#
# Two paths exercised:
#   1. Allowlisted master-data doctype (Project Key Sector) — should return
#      records but those records' field set is the explicit allowlist
#      (name + key_sector). Forbidden fields not present.
#   2. Non-allowlisted sensitive doctype (User) — should be REJECTED with
#      403 even for Administrator. The allowlist is the gate, not the role.
#
# Run with:
#   ./bench/bench.sh --target=local-docker --tier=a \
#       --scenarios='scenarios/security/*.yaml'

steps:
  - login_as: Administrator

  # Path 1 — allowlisted master-data doctype.
  - navigate: /api/method/mrvtools.api.get_data?doctype=Project%20Key%20Sector
  - capture_text: get-data-allowlisted-as-admin
  - capture: get-data-allowlisted-as-admin

assertions:
  # The allowlisted response body must never carry any sensitive field name —
  # belt-and-braces against a future PR widening the per-doctype field list.
  # The patterns target both "field":"value" JSON pairs and bare token leaks
  # (e.g. a stack trace that mentions reset_password_key would also fail).
  - no_text_matching:
      patterns:
        - "reset_password_key"
        - "reset_password_link_sent"
        - "\"password\"\\s*:"
        - "\"new_password\"\\s*:"
        - "\"api_secret\"\\s*:"
        - "\"api_key\"\\s*:"
        - "\"otp_secret\""
        - "smtp_password"
        - "encryption_key"

  # The allowlisted call should return 200 with a `message` envelope and at
  # least one row — Frappe master-data tables ship with seed records.
  # Detect via captured text containing the allowlisted field name.
  # (`key_sector` is the allowlisted Data field in Project Key Sector.)
  # If this assertion fails on a fresh DB without seed data, drop it; the
  # forbidden-field assertion above is the actual security gate.
  - no_text_matching:
      patterns:
        # Negative: response must NOT be a "Not permitted" error for an
        # allowlisted doctype called by Administrator.
        # We assert by checking the body does NOT contain the PermissionError
        # signature. (no_text_matching is the only "string body" assertion
        # available to us — used inverted for "must contain X" requires a
        # different scenario shape.)
        - "PermissionError.*Not permitted"

  - no_console_error_matching: "Traceback|TypeError|Internal Server Error"

tags: [security, day-1, allow_guest_audit, defense-in-depth]
sources:
  - bug: "2026-04-29 audit: defense-in-depth field-name strip on get_data response"
  - file: "mrvtools/api.py:_FORBIDDEN_FIELDS"
