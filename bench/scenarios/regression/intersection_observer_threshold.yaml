id: regression_intersection_observer_threshold
title: "No [data-reveal] elements stuck at opacity:0 after page settle"
perspective: { role: guest, persona: standard, environment: any }
preconditions: { sample_db: required, session: anonymous, cache: warm }
steps:
  - navigate: /frontend/home
  - wait_for_selector:
      selector: "[data-reveal].is-revealed"
      timeout_ms: 10000
  - capture: home-revealed
assertions:
  # The IO threshold pitfall: threshold>0 + negative bottom rootMargin left
  # short headlines stuck at opacity:0. Fix uses threshold:0 + synchronous
  # prime() walk in useReveal.
  - selector:
      selector: "[data-reveal].is-revealed"
      count: { min: 1 }
  # Tightened per UX audit 2026-04-30 finding F1 + architect review: any
  # [data-reveal] element WITHIN the initial viewport (top < window.innerHeight)
  # must be visible (opacity ≥ 0.99 — accounts for CSS transition rounding)
  # after the prime walk. Below-fold elements legitimately stay at 0 until
  # scroll; only the in-viewport ones are the bug.
  - run_assertion:
      script: |
        const reveals = Array.from(document.querySelectorAll('[data-reveal]'));
        const stuck = reveals.filter(el => {
          const r = el.getBoundingClientRect();
          const inViewport = r.top < window.innerHeight && r.bottom > 0;
          if (!inViewport) return false;
          const opacity = parseFloat(getComputedStyle(el).opacity);
          return opacity < 0.99;
        }).map(el => ({ cls: (el.className || '').slice(0,40), text: el.textContent.trim().slice(0,40), top: Math.round(el.getBoundingClientRect().top), opacity: getComputedStyle(el).opacity }));
        return { ok: stuck.length === 0, stuck_count: stuck.length, sample: stuck.slice(0, 3) };
      expect: { ok: true }

tags: [regression, reveal, day-1]
sources:
  - memory: feedback_io_threshold_pitfall.md
  - audit: docs/audits/2026-04-30-ux-audit-live-demo-CONSOLIDATED.md#f1
