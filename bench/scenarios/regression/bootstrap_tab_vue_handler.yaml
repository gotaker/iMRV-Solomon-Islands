id: regression_bootstrap_tab_vue_handler
title: "Tab-like nav handlers work via Vue @click (no aria-controls drift)"
perspective: { role: guest, persona: standard, environment: any }
preconditions: { sample_db: required, session: anonymous, cache: warm }

# The original bug: Bootstrap data-toggle="tab" markup contract was broken —
# aria-controls didn't point at panels — so tabs never activated. Fix was to
# switch to a Vue @click handler.
#
# In the current build /frontend/knowledge-resource redirects to /home, which
# has no nav-link/role=tab elements. We can't reproduce the original click
# scenario here. We assert what we CAN: the route resolves without erroring,
# the SPA mounts, and there are no data-toggle/aria-controls console errors.
# When the knowledge-resource page is reintroduced with tabs, restore the
# click step and a tighter assertion.
steps:
  - navigate: /frontend/knowledge-resource
  - wait_for_selector:
      selector: "[data-v-app]"
      timeout_ms: 15000
  - capture: knowledge-or-home

assertions:
  - selector:
      selector: "[data-v-app]"
      count: { min: 1 }
  - no_console_error_matching: "TypeError|ReferenceError|aria-controls|data-toggle"

tags: [regression, tabs, vue, day-1, needs:knowledge-resource-page]
sources:
  - memory: feedback_bootstrap_tab_override.md
  - note: "tab click step deferred until /frontend/knowledge-resource has a tab component"
