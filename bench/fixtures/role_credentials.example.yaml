# Fixture credentials per role.
#
# Copy this file to bench/fixtures/role_credentials.yaml (gitignored) and fill
# in real credentials per role. Each entry is a Frappe user account whose
# `roles` include exactly the role being keyed against. The bench will use
# these credentials to log in as that role.
#
# The Administrator entry is special — role_discovery.py uses it to enumerate
# the role inventory at run start.
#
# Naming rule: keys MUST match the Frappe Role doctype `name` exactly. If
# discovery finds a role that has no credential entry here, the bench will
# fail with an actionable error pointing at the missing key.

Administrator:
  email: Administrator
  password: admin

System Manager:
  email: sysmgr@example.com
  password: <fill-in>

